<!DOCTYPE html>

  <meta name="theme-color" content="#06070d" />
  <link rel="icon" href="../assets/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="../assets/favicon-16.png" />

  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
  <style>
    /* ── Product page overrides ── */
    .product-hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding: 120px 5vw 80px;
      max-width: 1100px;
      margin: 0 auto;
      gap: 64px;
    }
    .product-hero-left { flex: 1; min-width: 0; }
    .product-hero-right {
      flex: 0 0 340px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .product-hero-right img {
      width: 320px;
      height: 256px;
      object-fit: cover;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 24px 80px rgba(0,0,0,0.5);
    }
    .product-hero-right .no-thumb {
      width: 320px; height: 256px;
      background: rgba(255,255,255,0.04);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.08);
      display: flex; align-items: center; justify-content: center;
      font-size: 72px;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--text-dim);
      font-size: 14px;
      margin-bottom: 32px;
      transition: color .2s;
    }
    .back-link:hover { color: var(--text); }
    .product-cat-badge {
      display: inline-block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 100px;
      background: rgba(124,92,255,0.15);
      border: 1px solid rgba(124,92,255,0.3);
      color: var(--accent-2);
      margin-bottom: 20px;
    }
    .product-title {
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(32px, 5vw, 56px);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .product-tagline {
      font-size: 18px;
      color: var(--text-dim);
      margin-bottom: 12px;
      line-height: 1.6;
    }
    .product-dl-count {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
      font-family: "Space Grotesk", sans-serif;
      color: rgba(124,92,255,0.9);
      background: rgba(124,92,255,0.1);
      border: 1px solid rgba(124,92,255,0.25);
      border-radius: 20px;
      padding: 5px 14px;
      margin-bottom: 20px;
      letter-spacing: 0.02em;
    }
    .product-desc {
      font-size: 16px;
      color: var(--text-dim);
      line-height: 1.75;
      margin-bottom: 32px;
    }
    .product-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 36px; }
    .product-cta-group { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
    .btn-store {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      border-radius: 100px;
      font-size: 15px;
      font-weight: 600;
      background: var(--grad);
      color: #fff;
      text-decoration: none;
      transition: opacity .2s, transform .2s;
      cursor: pointer;
    }
    .btn-store:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-store-ghost {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 26px;
      border-radius: 100px;
      font-size: 15px;
      font-weight: 600;
      border: 1px solid rgba(255,255,255,0.15);
      color: var(--text);
      background: transparent;
      text-decoration: none;
      transition: border-color .2s, transform .2s;
    }
    .btn-store-ghost:hover { border-color: rgba(255,255,255,0.35); transform: translateY(-1px); }
    .dl-group { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 0; }
    .dl-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 22px;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 600;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--text);
      text-decoration: none;
      transition: background .2s, transform .2s;
    }
    .dl-btn:hover { background: rgba(255,255,255,0.12); transform: translateY(-1px); }

    /* ── Features section ── */
    .features-section {
      padding: 80px 5vw 100px;
      max-width: 1100px;
      margin: 0 auto;
    }
    .features-section h2 {
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(24px, 3vw, 36px);
      font-weight: 700;
      margin-bottom: 48px;
      color: var(--text);
    }
    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }
    .feature-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 28px;
      transition: border-color .2s, transform .25s;
    }
    .feature-card:hover { border-color: rgba(124,92,255,0.3); transform: translateY(-3px); }
    .feature-icon { font-size: 28px; margin-bottom: 14px; }
    .feature-title {
      font-family: "Space Grotesk", sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }
    .feature-desc { font-size: 14px; color: var(--text-dim); line-height: 1.65; }

    /* ── Screenshot gallery ── */
    .screenshots-section {
      padding: 0 5vw 96px;
      max-width: 1100px;
      margin: 0 auto;
    }
    .screenshots-section h2 {
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(24px, 3vw, 36px);
      font-weight: 700;
      margin-bottom: 28px;
      color: var(--text);
    }
    .screenshots-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }
    .screenshot-card {
      margin: 0;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      overflow: hidden;
    }
    .screenshot-card img {
      display: block;
      width: 100%;
      height: 220px;
      object-fit: cover;
      background: #05060c;
    }
    .screenshot-card figcaption {
      padding: 10px 12px;
      font-size: 13px;
      color: var(--text-dim);
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    /* ── Apex Debug Studio special page ── */
    .apex-page {
      max-width: 1280px;
      margin: 0 auto;
      padding: 128px 6vw 124px;
      display: flex;
      flex-direction: column;
      gap: 88px;
      position: relative;
    }
    .apex-page::before {
      content: "";
      position: absolute;
      inset: 56px 4vw auto;
      height: 420px;
      border-radius: 56px;
      background: radial-gradient(circle at 24% 25%, rgba(72, 186, 255, 0.18), transparent 55%),
                  radial-gradient(circle at 78% 20%, rgba(255, 86, 172, 0.2), transparent 56%),
                  radial-gradient(circle at 58% 72%, rgba(123, 121, 255, 0.16), transparent 54%);
      filter: blur(18px);
      z-index: -1;
    }
    .apex-hero {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 46px;
      align-items: stretch;
      padding: 56px;
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,0.14);
      background: linear-gradient(165deg, rgba(11, 16, 34, 0.96), rgba(8, 12, 26, 0.92));
      box-shadow: 0 32px 96px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(10px);
    }
    .apex-badge {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      width: fit-content;
      padding: 7px 13px;
      border-radius: 999px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #9edfff;
      border: 1px solid rgba(126, 211, 255, 0.4);
      background: rgba(15, 41, 69, 0.62);
      margin-bottom: 22px;
      font-weight: 600;
    }
    .apex-title {
      margin: 0 0 18px;
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(40px, 5vw, 68px);
      line-height: 1.03;
      letter-spacing: -0.025em;
      color: #f2f8ff;
      text-wrap: balance;
    }
    .apex-title span {
      display: block;
      margin-top: 6px;
      background: linear-gradient(90deg, #61d8ff 0%, #8b9fff 45%, #ff67ab 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .apex-desc {
      margin: 0 0 24px;
      font-size: 17px;
      line-height: 1.9;
      max-width: 61ch;
      color: rgba(220, 234, 255, 0.82);
    }
    .apex-org-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 32px;
    }
    .apex-org-tags span {
      font-size: 12px;
      padding: 7px 13px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.18);
      color: rgba(232,242,255,0.92);
      background: rgba(255,255,255,0.04);
    }
    .apex-cta {
      margin-bottom: 34px;
    }
    .apex-cta .dl-group {
      gap: 14px;
      margin-bottom: 0;
    }
    .apex-cta .dl-btn {
      padding: 13px 24px;
      border-color: rgba(104, 197, 255, 0.52);
      background: linear-gradient(122deg, rgba(33,59,91,0.92), rgba(49,33,104,0.85));
      color: #edf7ff;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.2);
      font-weight: 600;
    }
    .apex-meta {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 12px;
    }
    .apex-kpi {
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.03);
      padding: 14px 14px 13px;
    }
    .apex-kpi strong {
      display: block;
      margin-bottom: 5px;
      font-size: 20px;
      line-height: 1.06;
      color: #eef7ff;
      font-family: "Space Grotesk", sans-serif;
    }
    .apex-kpi span {
      font-size: 12px;
      line-height: 1.5;
      color: rgba(207,223,248,0.77);
    }
    .apex-stage {
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.14);
      background: linear-gradient(168deg, rgba(9,15,29,0.88), rgba(6,11,22,0.85));
      padding: 18px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 24px 70px rgba(5, 8, 20, 0.52);
    }
    .apex-stage::after {
      content: "";
      position: absolute;
      inset: -120% 18% auto -40%;
      height: 240%;
      background: linear-gradient(90deg, transparent, rgba(111, 216, 255, 0.12), transparent);
      transform: rotate(14deg);
      animation: apexSweep 6.5s linear infinite;
      pointer-events: none;
    }
    @keyframes apexSweep {
      0% { transform: translateX(-40%) rotate(14deg); }
      100% { transform: translateX(72%) rotate(14deg); }
    }
    .apex-stage-main {
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(112,189,255,0.35);
      box-shadow: 0 18px 42px rgba(0,0,0,0.45);
      transform: rotateX(var(--rx, 0deg)) rotateY(var(--ry, 0deg));
      transition: transform 0.14s ease-out;
      transform-style: preserve-3d;
      background: #0a1325;
    }
    .apex-stage-main img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: cover;
    }
    .apex-debug-widget {
      margin-top: 15px;
      border-radius: 13px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(8,14,28,0.83);
      padding: 12px 13px;
      font-size: 12px;
      color: rgba(215,230,252,0.88);
      line-height: 1.55;
    }
    .apex-debug-widget strong {
      display: block;
      color: #9fe2ff;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 7px;
    }
    .apex-flow {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }
    .apex-flow-card {
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.1);
      background: linear-gradient(160deg, rgba(11,18,34,0.84), rgba(8,14,26,0.74));
      padding: 22px 22px 20px;
      transition: transform .24s ease, border-color .24s ease;
    }
    .apex-flow-card:hover {
      transform: translateY(-4px);
      border-color: rgba(120, 201, 255, 0.44);
    }
    .apex-flow-step {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      margin-bottom: 14px;
      background: rgba(93,173,255,0.2);
      border: 1px solid rgba(132,208,255,0.4);
      color: #9edfff;
      font-size: 12px;
      font-weight: 700;
      font-family: "Space Grotesk", sans-serif;
    }
    .apex-flow-card h3 {
      margin: 0 0 10px;
      font-size: 18px;
      color: #edf6ff;
      font-family: "Space Grotesk", sans-serif;
    }
    .apex-flow-card p {
      margin: 0;
      font-size: 14px;
      line-height: 1.7;
      color: rgba(210,226,249,0.82);
    }
    .apex-section-title {
      margin: 0 0 26px;
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(26px, 3.1vw, 40px);
      color: #edf6ff;
      letter-spacing: -0.01em;
    }
    .apex-feature-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 22px;
    }
    .apex-feature {
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.1);
      background: linear-gradient(156deg, rgba(11,19,35,0.84), rgba(7,13,24,0.74));
      padding: 24px;
      transition: transform .24s ease, border-color .24s ease;
    }
    .apex-feature:hover {
      transform: translateY(-4px);
      border-color: rgba(120, 201, 255, 0.42);
    }
    .apex-feature .feature-icon {
      margin: 0 0 12px;
      font-size: 25px;
    }
    .apex-feature h3 {
      margin: 0 0 10px;
      font-size: 18px;
      color: #ebf5ff;
      font-family: "Space Grotesk", sans-serif;
    }
    .apex-feature p {
      margin: 0;
      font-size: 14px;
      line-height: 1.76;
      color: rgba(211,227,250,0.82);
    }
    .apex-gallery-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 20px;
    }
    .apex-shot {
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.13);
      overflow: hidden;
      background: #060b18;
      transform: rotateX(var(--rx, 0deg)) rotateY(var(--ry, 0deg));
      transition: transform 0.14s ease-out, border-color 0.2s;
    }
    .apex-shot.apex-shot--hero {
      grid-column: span 2;
    }
    .apex-shot:hover { border-color: rgba(118, 199, 255, 0.46); }
    .apex-shot img {
      width: 100%;
      display: block;
      object-fit: cover;
      max-height: 460px;
    }
    .apex-shot figcaption {
      padding: 12px 14px;
      font-size: 13px;
      color: rgba(225,237,255,0.86);
      border-top: 1px solid rgba(255,255,255,0.1);
      line-height: 1.6;
      background: rgba(7,14,29,0.68);
    }

    /* ── Footer strip ── */
    .product-footer {
      border-top: 1px solid rgba(255,255,255,0.06);
      padding: 40px 5vw;
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }
    .product-footer .brand { font-family: "Dancing Script", cursive; font-size: 26px; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .product-footer p { font-size: 13px; color: var(--text-dim); }

    /* ── Not found ── */
    .not-found {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      text-align: center;
      padding: 40px;
    }
    .not-found h1 { font-family: "Space Grotesk", sans-serif; font-size: 48px; }
    .not-found p { color: var(--text-dim); font-size: 16px; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .product-hero { flex-direction: column; padding-top: 100px; gap: 40px; }
      .product-hero-right { display: none; }
      .product-footer { justify-content: center; text-align: center; }
      .apex-page { padding: 96px 5vw 92px; gap: 58px; }
      .apex-hero { grid-template-columns: 1fr; gap: 28px; padding: 26px; }
      .apex-title { font-size: clamp(32px, 11vw, 50px); }
      .apex-desc { font-size: 15px; }
      .apex-meta { grid-template-columns: 1fr; }
      .apex-flow { grid-template-columns: 1fr; }
      .apex-feature-grid { grid-template-columns: 1fr; }
      .apex-gallery-grid { grid-template-columns: 1fr; }
      .apex-shot.apex-shot--hero { grid-column: span 1; }
      .apex-shot img { max-height: unset; height: auto; }
    }
  </style>
</head>

  <main id="main"></main>

  <script>
    const appleSVG = '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>';
    const windowsSVG = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M0 3.449 9.75 2.1v9.451H0m10.949-9.602L24 0v11.4H10.949M0 12.6h9.75v9.451L0 20.699M10.949 12.6H24V24l-12.9-1.801"/></svg>';
    const chromeSVG = '<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>';

    function osIcon(os) {
      if (os === 'mac') return appleSVG;
      if (os === 'windows') return windowsSVG;
      return '';
    }

    function fmtCount(n) {
      if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k+';
      return n + '+';
    }

    async function loadGithubCount(p) {
      if (!p.githubRepo || !p.downloadSeed) return;
      try {
        const res = await fetch(`https://api.github.com/repos/${p.githubRepo}/releases`, { cache: 'no-store' });
        if (!res.ok) return;
        const releases = await res.json();
        const total = releases.reduce((sum, r) =>
          sum + r.assets.reduce((s, a) => s + (a.download_count || 0), 0), 0);
        const el = document.getElementById('page-dl-count');
        if (el) el.textContent = '⬇ ' + fmtCount((p.downloadSeed || 0) + total) + ' downloads';
      } catch (_) {}
    }

    function buildCtaHTML(p) {
      if (Array.isArray(p.downloads) && p.downloads.length) {
        const dlBtns = p.downloads.map(d =>
          d.url
            ? `<a class="dl-btn" href="${d.url}" ${d.external ? 'target="_blank" rel="noopener"' : `download="${d.file || ''}"`}>${osIcon(d.os)} ${d.label}</a>`
            : `<span class="dl-btn" style="opacity:.5;cursor:default">${osIcon(d.os)} ${d.label} (soon)</span>`
        ).join('');
        return `<div class="dl-group">${dlBtns}</div>`;
      }
      if (p.link && p.link !== '#') {
        const label = p.storeLabel || 'View Product';
        return `<a class="btn-store" href="${p.link}" target="_blank" rel="noopener">${p.category === 'extension' ? chromeSVG : ''} ${label}</a>`;
      }
      return '';
    }

    function initApexMotion() {
      document.querySelectorAll('[data-apex-tilt]').forEach(el => {
        el.addEventListener('mousemove', e => {
          const r = el.getBoundingClientRect();
          const rx = (((e.clientY - r.top) / r.height) - 0.5) * -7;
          const ry = (((e.clientX - r.left) / r.width) - 0.5) * 8;
          el.style.setProperty('--rx', `${rx}deg`);
          el.style.setProperty('--ry', `${ry}deg`);
        });
        el.addEventListener('mouseleave', () => {
          el.style.setProperty('--rx', '0deg');
          el.style.setProperty('--ry', '0deg');
        });
      });
    }

    function renderApexPage(p, cat) {
      const shots = (p.screenshots || []).slice(0, 4);
      const heroImage = shots[0]?.image || p.image;
      const galleryShots = shots.length ? shots : (p.image ? [{ image: p.image, caption: `${p.name} preview` }] : []);
      const ctaHTML = buildCtaHTML(p);

      document.getElementById('main').innerHTML = `
        <div class="apex-page">
          <a href="/#products" class="back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            All products
          </a>
          <section class="apex-hero">
            <article>
              <span class="apex-badge">Live Apex Debugging Studio</span>
              <h1 class="apex-title">${p.name}<span>debug live org behavior, not mock data</span></h1>
              <p class="apex-desc">${p.description || ''}</p>
              <div class="apex-org-tags">
                <span>DX Org</span>
                <span>Customer Orgs</span>
                <span>Sandbox Org</span>
                <span>Command Palette Workflow</span>
              </div>
              <div class="product-cta-group apex-cta">
                ${ctaHTML}
                <a class="btn-store-ghost" href="/#products">← See all products</a>
              </div>
              <div class="apex-meta">
                <div class="apex-kpi"><strong>${cat[p.category] || 'Desktop App'}</strong><span>Purpose-built for Salesforce engineering teams</span></div>
                <div class="apex-kpi"><strong id="page-dl-count">⬇ ${fmtCount(p.downloadSeed || 0)}</strong><span>Total downloads</span></div>
                <div class="apex-kpi"><strong>V8-style Flow</strong><span>Breakpoints, stepping, variable scopes, and replay</span></div>
              </div>
            </article>

            <article class="apex-stage">
              <figure class="apex-stage-main" data-apex-tilt>
                ${heroImage ? `<img src="../${heroImage}" alt="${p.name} live debug preview" />` : ''}
              </figure>
              <div class="apex-debug-widget">
                <strong>Live Debug Session</strong>
                Connected to DX Org and Customer Orgs. Pulling transaction frames, watching scoped variables, and replaying execution with live record context.
              </div>
            </article>
          </section>

          <section>
            <h2 class="apex-section-title">Debugging workflow without context switching</h2>
            <div class="apex-flow">
              <article class="apex-flow-card">
                <span class="apex-flow-step">1</span>
                <h3>Connect Orgs Fast</h3>
                <p>Jump into Production, Sandbox, DX Org, or custom domain orgs from one command-driven connector.</p>
              </article>
              <article class="apex-flow-card">
                <span class="apex-flow-step">2</span>
                <h3>Inspect Live Execution</h3>
                <p>Set breakpoints, step through Apex, inspect local scope, and validate runtime state with live data.</p>
              </article>
              <article class="apex-flow-card">
                <span class="apex-flow-step">3</span>
                <h3>Resolve and Replay</h3>
                <p>Run SOQL, replay execution paths, and verify fixes in the same workspace without tool hopping.</p>
              </article>
            </div>
          </section>

          <section>
            <h2 class="apex-section-title">Why teams pick Apex Debug Studio</h2>
            <div class="apex-feature-grid">
              ${(p.features || []).map(f => `
                <article class="apex-feature">
                  <div class="feature-icon">${f.icon}</div>
                  <h3>${f.title}</h3>
                  <p>${f.desc}</p>
                </article>`).join('')}
            </div>
          </section>

          ${(galleryShots.length)
            ? `<section>
                <h2 class="apex-section-title">Product walkthrough</h2>
                <div class="apex-gallery-grid">
                  ${galleryShots.map((s, i) => `
                    <figure class="apex-shot ${i === 0 ? 'apex-shot--hero' : ''}" data-apex-tilt>
                      <img src="../${s.image}" alt="${s.alt || `${p.name} screenshot`}" loading="lazy" />
                      <figcaption>${s.caption || 'Apex Debug Studio screenshot'}</figcaption>
                    </figure>`).join('')}
                </div>
              </section>`
            : ''}

          <footer class="product-footer" style="margin-top:28px">
            <span class="brand">Splec</span>
            <p>Built with care by <a href="/" style="color:var(--accent-2)">Splec Developers</a></p>
            <a href="/#contact" style="color:var(--text-dim);font-size:13px">Get in touch →</a>
          </footer>
        </div>`;

      initApexMotion();
      loadGithubCount(p);
    }

    function renderPage(p) {
      const cat = { android: 'Android App', ios: 'iOS App', extension: 'Chrome Extension', web: 'Web App', desktop: 'Desktop App', app: 'App' };
      const appCat = { android: 'MobileApplication', ios: 'MobileApplication', extension: 'WebApplication', web: 'WebApplication', desktop: 'DesktopApplication' };
      document.body.classList.remove('apex-product-active');

      // Update meta tags
      document.title = `${p.name} — Splec Developers`;
      document.getElementById('pageDesc').setAttribute('content', p.tagline ? `${p.tagline}. ${p.description}` : p.description);
      document.getElementById('ogTitle').setAttribute('content', `${p.name} — Splec Developers`);
      document.getElementById('ogDesc').setAttribute('content', p.tagline || p.description);
      document.getElementById('pageCanonical').setAttribute('href', `https://splecdevelopers.com/products/?p=${p.slug}`);

      // Inject JSON-LD structured data for Google
      const featureList = (p.features || []).map(f => f.title).join(', ');
      const jsonLd = {
        "@context": "https://schema.org",
        "@type": appCat[p.category] || "SoftwareApplication",
        "name": p.name,
        "description": p.description,
        "applicationCategory": cat[p.category] || "Application",
        "operatingSystem": p.category === 'ios' ? 'iOS' : p.category === 'android' ? 'Android' : p.category === 'desktop' ? 'macOS, Windows' : 'Any',
        "author": { "@type": "Organization", "name": "Splec Developers", "url": "https://splecdevelopers.com" },
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "featureList": featureList,
        ...(p.link && p.link !== '#' ? { "url": p.link } : {})
      };
      const ldScript = document.createElement('script');
      ldScript.type = 'application/ld+json';
      ldScript.textContent = JSON.stringify(jsonLd, null, 2);
      document.head.appendChild(ldScript);

      if (p.slug === 'apex-debug-studio') {
        document.body.classList.add('apex-product-active');
        renderApexPage(p, cat);
        return;
      }

      // Build CTA
      const ctaHTML = buildCtaHTML(p);

      // Features
      const featuresHTML = (p.features && p.features.length)
        ? `<section class="features-section">
            <h2>What it does</h2>
            <div class="features-grid">
              ${p.features.map(f => `
                <div class="feature-card">
                  <div class="feature-icon">${f.icon}</div>
                  <div class="feature-title">${f.title}</div>
                  <p class="feature-desc">${f.desc}</p>
                </div>`).join('')}
            </div>
          </section>`
        : '';

      const screenshotsHTML = (p.screenshots && p.screenshots.length)
        ? `<section class="screenshots-section">
            <h2>Screenshots</h2>
            <div class="screenshots-grid">
              ${p.screenshots.map(s => `
                <figure class="screenshot-card">
                  <img src="../${s.image}" alt="${s.alt || `${p.name} screenshot`}" loading="lazy" />
                  ${s.caption ? `<figcaption>${s.caption}</figcaption>` : ''}
                </figure>`).join('')}
            </div>
          </section>`
        : '';

      // Thumb
      const thumbHTML = p.image
        ? `<img src="../${p.image}" alt="${p.name} preview" />`
        : `<div class="no-thumb">${p.icon || '📦'}</div>`;

      document.getElementById('main').innerHTML = `
        <div class="product-hero">
          <div class="product-hero-left">
            <a href="/#products" class="back-link">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
              All products
            </a>
            <div class="product-cat-badge">${cat[p.category] || 'Product'}</div>
            <h1 class="product-title">${p.name}</h1>
            <p class="product-tagline">${p.tagline || ''}</p>
            ${p.downloadSeed ? `<p id="page-dl-count" class="product-dl-count">⬇ ${fmtCount(p.downloadSeed)} downloads</p>` : ''}
            <p class="product-desc">${p.description || ''}</p>
            <div class="product-tags">${(p.tags || []).map(t => `<span class="tag">${t}</span>`).join('')}</div>
            <div class="product-cta-group">
              ${ctaHTML}
              <a class="btn-store-ghost" href="/#products">← See all products</a>
            </div>
          </div>
          <div class="product-hero-right">${thumbHTML}</div>
        </div>
        ${featuresHTML}
        ${screenshotsHTML}
        <footer class="product-footer">
          <span class="brand">Splec</span>
          <p>Built with care by <a href="/" style="color:var(--accent-2)">Splec Developers</a></p>
          <a href="/#contact" style="color:var(--text-dim);font-size:13px">Get in touch →</a>
        </footer>`;

      // Load live GitHub download count (non-blocking)
      loadGithubCount(p);
    }

    function renderNotFound() {
      document.body.classList.remove('apex-product-active');
      document.getElementById('main').innerHTML = `
        <div class="not-found">
          <h1>404</h1>
          <p>Product not found.</p>
          <a href="/#products" class="btn btn-nav" style="margin-top:8px">← Back to products</a>
        </div>`;
    }

    // Read ?p=slug from URL
    const slug = new URLSearchParams(window.location.search).get('p');
    const product = PRODUCTS.find(p => p.slug === slug);
    if (product) renderPage(product);
    else renderNotFound();

    // Minimal navbar scroll effect
    window.addEventListener('scroll', () => {
      document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 40);
    });

    // Mobile menu
    document.getElementById('menuToggle')?.addEventListener('click', function() {
      const nav = document.querySelector('.nav-links');
      const open = nav.classList.toggle('open');
      this.setAttribute('aria-expanded', open);
    });
  </script>
</body>
</html>
