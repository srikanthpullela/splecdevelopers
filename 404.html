<!DOCTYPE html>
<html lang="en">
<head>

  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .nf-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 18px;
      padding: 40px;
    }
    .nf-code {
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(72px, 16vw, 160px);
      font-weight: 700;
      line-height: 1;
      background: var(--grad);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .nf-wrap h1 { font-family: "Space Grotesk", sans-serif; font-size: 26px; }
    .nf-wrap p { color: var(--text-dim); font-size: 15px; max-width: 46ch; }
    .nf-actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="bg-aurora" aria-hidden="true"></div>
  <div class="nf-wrap">
    <span class="nf-code">404</span>
    <h1>This page wandered off.</h1>

    <div class="nf-actions">
      <a class="btn btn-primary" href="/">← Back to home</a>
      <a class="btn btn-ghost" href="/#products">Browse products</a>
    </div>
  </div>
