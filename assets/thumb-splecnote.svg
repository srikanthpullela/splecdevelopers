<svg xmlns="http://www.w3.org/2000/svg" width="400" height="320" viewBox="0 0 400 320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06070d"/>
      <stop offset="1" stop-color="#10131f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#9db4ff"/>
    </linearGradient>
    <clipPath id="win"><rect x="40" y="20" width="320" height="240" rx="12"/></clipPath>
  </defs>

  <!-- background -->
  <rect width="400" height="320" fill="url(#bg)"/>

  <!-- glow blobs -->
  <ellipse cx="80" cy="60" rx="90" ry="70" fill="#7c5cff" opacity="0.08"/>
  <ellipse cx="340" cy="260" rx="80" ry="60" fill="#4a9eff" opacity="0.07"/>

  <!-- App window shadow -->
  <rect x="44" y="26" width="320" height="240" rx="13" fill="#000" opacity="0.5"/>

  <!-- App window -->
  <rect x="40" y="20" width="320" height="240" rx="12" fill="#13151f" stroke="rgba(124,92,255,0.35)" stroke-width="1.5"/>

  <!-- Titlebar -->
  <rect x="40" y="20" width="320" height="34" rx="0" fill="#0e1018" clip-path="url(#win)"/>
  <rect x="40" y="20" width="320" height="12" rx="12" fill="#0e1018"/>

  <!-- traffic lights -->
  <circle cx="60" cy="37" r="5" fill="#ff5f57"/>
  <circle cx="76" cy="37" r="5" fill="#febc2e"/>
  <circle cx="92" cy="37" r="5" fill="#28c840"/>

  <!-- title text as shapes: "Splec Note" approximated with rect blocks -->
  <rect x="168" y="32" width="64" height="8" rx="3" fill="rgba(255,255,255,0.18)"/>

  <!-- Tab bar -->
  <rect x="40" y="54" width="320" height="26" fill="#0c0e18" clip-path="url(#win)"/>
  <!-- active tab -->
  <rect x="48" y="56" width="82" height="22" rx="6" fill="#1e2030"/>
  <circle cx="60" cy="67" r="3" fill="#7c5cff" opacity="0.9"/>
  <!-- tab label pill -->
  <rect x="67" y="62" width="55" height="9" rx="3" fill="rgba(255,255,255,0.25)"/>
  <!-- other tabs -->
  <rect x="140" y="60" width="44" height="9" rx="3" fill="rgba(255,255,255,0.1)"/>
  <rect x="192" y="60" width="36" height="9" rx="3" fill="rgba(255,255,255,0.1)"/>
  <!-- + button circle -->
  <circle cx="284" cy="67" r="7" fill="rgba(255,255,255,0.06)"/>
  <rect x="281" y="66" width="6" height="2" rx="1" fill="rgba(255,255,255,0.3)"/>
  <rect x="283" y="64" width="2" height="6" rx="1" fill="rgba(255,255,255,0.3)"/>

  <!-- Editor area -->
  <rect x="40" y="80" width="320" height="164" fill="#0f1120" clip-path="url(#win)"/>

  <!-- line number gutter -->
  <rect x="40" y="80" width="30" height="164" fill="#0c0d1a" clip-path="url(#win)"/>
  <!-- line number dots -->
  <rect x="48" y="90" width="14" height="5" rx="2" fill="rgba(255,255,255,0.12)"/>
  <rect x="48" y="103" width="14" height="5" rx="2" fill="rgba(255,255,255,0.12)"/>
  <rect x="48" y="116" width="14" height="5" rx="2" fill="rgba(124,92,255,0.5)"/>
  <rect x="48" y="129" width="14" height="5" rx="2" fill="rgba(255,255,255,0.12)"/>
  <rect x="48" y="142" width="14" height="5" rx="2" fill="rgba(255,255,255,0.12)"/>
  <rect x="48" y="155" width="14" height="5" rx="2" fill="rgba(255,255,255,0.12)"/>
  <rect x="48" y="168" width="14" height="5" rx="2" fill="rgba(255,255,255,0.12)"/>
  <rect x="48" y="181" width="14" height="5" rx="2" fill="rgba(255,255,255,0.12)"/>

  <!-- active line highlight -->
  <rect x="70" y="112" width="286" height="13" fill="rgba(124,92,255,0.08)" rx="2"/>

  <!-- code lines (color blocks) -->
  <!-- line 1: heading purple -->
  <rect x="76" y="88" width="80" height="7" rx="2" fill="#7c5cff" opacity="0.85"/>
  <!-- line 2: empty -->
  <!-- line 3: body text blue (active) -->
  <rect x="76" y="114" width="180" height="7" rx="2" fill="#9db4ff" opacity="0.8"/>
  <!-- line 4: empty -->
  <!-- line 5: yellow heading -->
  <rect x="76" y="140" width="70" height="7" rx="2" fill="#febc2e" opacity="0.9"/>
  <!-- line 6-8: list items -->
  <rect x="76" y="153" width="10" height="6" rx="1" fill="rgba(255,255,255,0.3)"/>
  <rect x="92" y="153" width="130" height="6" rx="2" fill="rgba(255,255,255,0.45)"/>
  <rect x="76" y="166" width="10" height="6" rx="1" fill="rgba(255,255,255,0.3)"/>
  <rect x="92" y="166" width="110" height="6" rx="2" fill="rgba(255,255,255,0.45)"/>
  <rect x="76" y="179" width="10" height="6" rx="1" fill="rgba(255,255,255,0.3)"/>
  <rect x="92" y="179" width="150" height="6" rx="2" fill="rgba(255,255,255,0.45)"/>
  <!-- cursor -->
  <rect x="76" y="197" width="4" height="10" rx="1" fill="#7c5cff" opacity="0.9"/>

  <!-- Status bar -->
  <rect x="40" y="222" width="320" height="18" fill="#0c0e18" clip-path="url(#win)"/>
  <rect x="50" y="229" width="50" height="5" rx="2" fill="rgba(124,92,255,0.6)"/>
  <rect x="112" y="229" width="80" height="5" rx="2" fill="rgba(255,255,255,0.15)"/>
  <rect x="320" y="229" width="30" height="5" rx="2" fill="rgba(255,255,255,0.1)"/>

  <!-- label area -->
  <rect x="24" y="276" width="110" height="14" rx="4" fill="url(#accent)" opacity="0.9"/>
  <rect x="24" y="298" width="200" height="8" rx="3" fill="rgba(124,92,255,0.45)"/>
</svg>
