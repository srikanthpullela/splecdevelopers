<svg xmlns="http://www.w3.org/2000/svg" width="400" height="320" viewBox="0 0 400 320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06070d"/>
      <stop offset="1" stop-color="#0d0f22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#19c2ff"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <clipPath id="panel"><rect x="100" y="24" width="200" height="240" rx="16"/></clipPath>
  </defs>
  <rect width="400" height="320" fill="url(#bg)"/>
  <!-- ambient glow -->
  <circle cx="200" cy="140" r="100" fill="#7c5cff" opacity="0.07" filter="url(#glow)"/>
  <!-- popup panel -->
  <rect x="100" y="24" width="200" height="240" rx="16" fill="rgba(255,255,255,0.05)" stroke="rgba(124,92,255,0.35)" stroke-width="1.5"/>
  <!-- panel header -->
  <rect x="100" y="24" width="200" height="44" rx="16" fill="rgba(124,92,255,0.18)" clip-path="url(#panel)"/>
  <rect x="100" y="52" width="200" height="16" fill="rgba(124,92,255,0.18)"/>
  <text x="120" y="51" font-family="Space Grotesk,sans-serif" font-size="13" font-weight="700" fill="white">📋 Clipify</text>
  <!-- search bar -->
  <rect x="114" y="76" width="172" height="22" rx="8" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="125" y="91" font-family="Arial" font-size="10" fill="rgba(255,255,255,0.3)">🔍  Search history...</text>
  <!-- clipboard items -->
  <!-- item 1 - pinned -->
  <rect x="114" y="106" width="172" height="34" rx="8" fill="rgba(124,92,255,0.2)" stroke="rgba(124,92,255,0.4)" stroke-width="1"/>
  <text x="124" y="119" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.85)">https://splecdevelopers.com</text>
  <text x="124" y="131" font-family="Arial" font-size="8" fill="rgba(124,92,255,0.8)">📌 Pinned · link</text>
  <!-- item 2 -->
  <rect x="114" y="146" width="172" height="30" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="124" y="158" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.7)">console.log("hello world")</text>
  <text x="124" y="170" font-family="Arial" font-size="8" fill="rgba(25,194,255,0.7)">code · 2m ago</text>
  <!-- item 3 -->
  <rect x="114" y="182" width="172" height="30" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="124" y="194" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.7)">hello@splecdevelopers.com</text>
  <text x="124" y="206" font-family="Arial" font-size="8" fill="rgba(25,194,255,0.7)">email · 5m ago</text>
  <!-- item 4 faded -->
  <rect x="114" y="218" width="172" height="30" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <rect x="124" y="228" width="90" height="7" rx="3" fill="rgba(255,255,255,0.15)"/>
  <rect x="124" y="239" width="55" height="5" rx="2" fill="rgba(255,255,255,0.08)"/>
  <!-- lock icon -->
  <circle cx="364" cy="40" r="18" fill="rgba(25,194,255,0.12)" stroke="rgba(25,194,255,0.3)" stroke-width="1"/>
  <text x="364" y="46" font-family="Arial" font-size="14" text-anchor="middle">🔒</text>
  <!-- label -->
  <text x="24" y="298" font-family="Space Grotesk,sans-serif" font-size="17" font-weight="700" fill="rgba(255,255,255,0.9)">Clipify</text>
  <text x="24" y="314" font-family="Space Grotesk,sans-serif" font-size="11" fill="rgba(25,194,255,0.8)">Clipboard history, privately</text>
</svg>
