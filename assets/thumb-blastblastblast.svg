<svg xmlns="http://www.w3.org/2000/svg" width="400" height="320" viewBox="0 0 400 320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a0a00"/>
      <stop offset="1" stop-color="#2d0f00"/>
    </linearGradient>
    <linearGradient id="fire" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#ff3d00"/>
      <stop offset="0.5" stop-color="#ff8c00"/>
      <stop offset="1" stop-color="#ffdd00"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow2"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="320" fill="url(#bg)"/>
  <!-- stars/particles -->
  <circle cx="40" cy="30" r="1.5" fill="#ff8c00" opacity="0.7"/>
  <circle cx="120" cy="15" r="1" fill="#ffdd00" opacity="0.6"/>
  <circle cx="200" cy="25" r="2" fill="#ff3d00" opacity="0.5"/>
  <circle cx="300" cy="10" r="1.5" fill="#ff8c00" opacity="0.7"/>
  <circle cx="370" cy="40" r="1" fill="#ffdd00" opacity="0.6"/>
  <circle cx="60" cy="80" r="1" fill="#ff3d00" opacity="0.4"/>
  <circle cx="350" cy="70" r="1.5" fill="#ff8c00" opacity="0.5"/>
  <!-- explosion glow center -->
  <circle cx="200" cy="140" r="90" fill="#ff4500" opacity="0.08" filter="url(#glow)"/>
  <!-- explosion burst -->
  <g filter="url(#glow)" opacity="0.9">
    <!-- rays -->
    <line x1="200" y1="140" x2="200" y2="60" stroke="url(#fire)" stroke-width="4" stroke-linecap="round"/>
    <line x1="200" y1="140" x2="256" y2="84" stroke="#ff8c00" stroke-width="3" stroke-linecap="round"/>
    <line x1="200" y1="140" x2="280" y2="140" stroke="#ff3d00" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="200" y1="140" x2="256" y2="196" stroke="#ff6600" stroke-width="3" stroke-linecap="round"/>
    <line x1="200" y1="140" x2="144" y2="84" stroke="#ff8c00" stroke-width="3" stroke-linecap="round"/>
    <line x1="200" y1="140" x2="120" y2="140" stroke="#ff3d00" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="200" y1="140" x2="144" y2="196" stroke="#ff6600" stroke-width="3" stroke-linecap="round"/>
    <line x1="200" y1="140" x2="200" y2="220" stroke="url(#fire)" stroke-width="4" stroke-linecap="round"/>
  </g>
  <!-- explosion circle -->
  <circle cx="200" cy="140" r="38" fill="#ff4500" opacity="0.85" filter="url(#glow)"/>
  <circle cx="200" cy="140" r="26" fill="#ff8c00" opacity="0.9"/>
  <circle cx="200" cy="140" r="14" fill="#ffdd00" opacity="1"/>
  <!-- 💥 emoji text -->
  <text x="200" y="152" font-family="Arial" font-size="22" text-anchor="middle" filter="url(#glow2)">💥</text>
  <!-- tank body -->
  <g transform="translate(90,230)">
    <rect x="0" y="10" width="80" height="30" rx="8" fill="#3a3a3a"/>
    <rect x="-8" y="20" width="96" height="16" rx="4" fill="#2a2a2a"/>
    <!-- wheels -->
    <circle cx="8" cy="36" r="8" fill="#222" stroke="#555" stroke-width="1.5"/>
    <circle cx="28" cy="36" r="8" fill="#222" stroke="#555" stroke-width="1.5"/>
    <circle cx="52" cy="36" r="8" fill="#222" stroke="#555" stroke-width="1.5"/>
    <circle cx="72" cy="36" r="8" fill="#222" stroke="#555" stroke-width="1.5"/>
    <!-- turret -->
    <rect x="20" y="0" width="40" height="18" rx="6" fill="#555"/>
    <!-- barrel -->
    <rect x="55" y="6" width="50" height="8" rx="4" fill="#444"/>
    <!-- muzzle flash -->
    <circle cx="108" cy="10" r="6" fill="#ffdd00" opacity="0.9" filter="url(#glow2)"/>
  </g>
  <!-- flying debris -->
  <rect x="310" y="60" width="18" height="10" rx="3" fill="#555" opacity="0.8" transform="rotate(-25,310,60)"/>
  <rect x="60" y="100" width="14" height="8" rx="2" fill="#444" opacity="0.7" transform="rotate(15,60,100)"/>
  <circle cx="330" cy="160" r="5" fill="#ff4500" opacity="0.6"/>
  <circle cx="70" cy="170" r="4" fill="#ff8c00" opacity="0.5"/>
  <!-- label -->
  <text x="24" y="302" font-family="Space Grotesk, sans-serif" font-size="17" font-weight="700" fill="rgba(255,255,255,0.9)">BlastBlastBlast</text>
  <text x="24" y="318" font-family="Space Grotesk, sans-serif" font-size="11" fill="rgba(255,140,0,0.8)">Destroy any webpage</text>
</svg>
